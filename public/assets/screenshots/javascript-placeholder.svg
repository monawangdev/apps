<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript Prettify screenshot placeholder</title>
  <desc id="desc">Placeholder frame showing formatted JavaScript response.</desc>
  <rect width="1440" height="980" rx="42" fill="#f5f5f7"/>
  <rect x="86" y="82" width="1268" height="816" rx="34" fill="#161718"/>
  <text x="142" y="166" font-family="SF Pro Text, Arial" font-size="32" font-weight="700" fill="#f8f9fa">JavaScript Prettify</text>
  <text x="142" y="246" font-family="Menlo, monospace" font-size="24" fill="#74c0fc">const</text>
  <text x="226" y="246" font-family="Menlo, monospace" font-size="24" fill="#f8f9fa">formatResponse = async (url) =&gt; {'{'}</text>
  <text x="186" y="306" font-family="Menlo, monospace" font-size="24" fill="#ffa94d">const</text>
  <text x="270" y="306" font-family="Menlo, monospace" font-size="24" fill="#f8f9fa">source = await fetch(url);</text>
  <text x="186" y="366" font-family="Menlo, monospace" font-size="24" fill="#8ce99a">return</text>
  <text x="284" y="366" font-family="Menlo, monospace" font-size="24" fill="#f8f9fa">prettify(await source.text());</text>
  <text x="142" y="426" font-family="Menlo, monospace" font-size="24" fill="#f8f9fa">{'}'};</text>
  <rect x="930" y="248" width="240" height="240" rx="34" fill="#ffd43b"/>
  <text x="1008" y="386" font-family="SF Pro Text, Arial" font-size="52" font-weight="700" fill="#1d1d1f">JS</text>
</svg>
