# Long string values with various block styles
literal_preserve: |
  This is a long literal block that preserves all formatting.
  Each line starts on a new line.
  Indentation is preserved exactly.
  
  Empty lines are kept.
  
    Indented lines keep their indentation.
  
  The final newline is included.

literal_strip: |-
  This literal block strips the final newline.
  No newline at the end of this string.
  Useful when you don't want trailing newlines.

literal_keep: |+
  This literal block keeps all trailing newlines.
  Multiple newlines at the end are preserved.
  


folded_single: >
  This is a folded string.
  Newlines become spaces.
  Perfect for long paragraphs
  that should flow naturally.
  
  Blank lines become newlines.
  
    Indented lines are literal.
    They preserve their newlines.

folded_strip: >-
  This folded string strips trailing newlines.
  All on one line when parsed.
  No newline at the end.

folded_keep: >+
  This folded string keeps trailing newlines.
  Multiple newlines at end are preserved.



