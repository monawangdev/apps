# YAML Anchors and Aliases Examples
defaults: &defaults
  adapter: postgres
  host: localhost
  port: 5432
  pool: 5
  timeout: 3000

development:
  database: myapp_development
  <<: *defaults

test:
  database: myapp_test
  <<: *defaults
  pool: 2

production:
  database: myapp_production
  adapter: mysql
  host: db.example.com
  port: 3306
  pool: 20
  timeout: 5000

# Nested anchors
base_config: &base_config
  retry:
    attempts: 3
    delay: 1000
  
  logging:
    level: info
    format: json

api_service:
  name: api
  port: 8080
  config:
    <<: *base_config
    logging:
      level: debug

worker_service:
  name: worker
  config:
    <<: *base_config
    retry:
      attempts: 5
      delay: 2000

# Anchor chains
common_labels: &common_labels
  app: myapp
  version: '1.0'
  managed-by: helm

service_a:
  labels:
    <<: *common_labels
    component: service-a

service_b:
  labels:
    <<: *common_labels
    component: service-b