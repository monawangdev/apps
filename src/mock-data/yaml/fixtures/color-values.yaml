gradients:
  description: "CSS gradient strings containing color values"
  linearSimple: "linear-gradient(to right, #FF0000, #0000FF)"
  linearMultiStop: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)"
  radial: "radial-gradient(circle, rgba(99,102,241,1) 0%, rgba(168,85,247,0.4) 100%)"
