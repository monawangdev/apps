designTokens:
  description: "Design token style — semantic color names mapped to values"
  colorPrimary: "#6366F1"
  colorPrimaryHover: "#4F46E5"
  colorPrimaryActive: "#4338CA"
  colorSecondary: "#EC4899"
  colorSuccess: "#10B981"
  colorWarning: "#F59E0B"
  colorError: "#EF4444"
  colorInfo: "#3B82F6"
  colorSurface: "rgb(255, 255, 255)"
  colorSurfaceDark: "rgb(15, 23, 42)"
  colorBorder: "rgba(0, 0, 0, 0.12)"
  colorBorderDark: "rgba(255, 255, 255, 0.12)"
  colorTextPrimary: "hsl(222, 47%, 11%)"
  colorTextSecondary: "hsl(215, 16%, 47%)"
  colorTextDisabled: "hsla(215, 16%, 47%, 0.5)"
  colorOverlay: "rgba(0, 0, 0, 0.5)"
  colorFocus: "oklch(0.65 0.18 250 / 0.4)"

edgeCases:
  description: "Edge cases and unusual but valid color formats"
  hexUppercase: "#FF6B6B"
  hexLowercase: "#ff6b6b"
  hexMixed: "#Ff6b6b"
  rgbNoSpaces: "rgb(255,0,0)"
  rgbExtraSpaces: "rgb( 255 , 0 , 0 )"
  rgbSlashAlpha: "rgb(255 0 0 / 0.5)"
  hslSlashAlpha: "hsl(0 100% 50% / 50%)"
  oklchWithAlpha: "oklch(0.628 0.2577 29.23 / 0.75)"
  labWithAlpha: "lab(53.23 80.11 67.22 / 0.9)"
  none: none
  currentColor: currentColor
  transparent: transparent