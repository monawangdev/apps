title: Color Value Cases
description: "用于测试各种颜色格式的识别与预览能力"

hex:
  description: 6-digit and 3-digit hex colors
  red: "#FF0000"
  green: "#00FF00"
  blue: "#0000FF"
  white: "#FFFFFF"
  black: "#000000"
  shorthand: "#F0C"
  shorthandWhite: "#FFF"
  brand: "#1DA1F2"
  slate900: "#0F172A"
  indigo500: "#6366F1"
  emerald400: "#34D399"
  amber300: "#FCD34D"
  rose600: "#E11D48"
  neutral700: "#404040"

hex8:
  description: 8-digit hex with alpha channel
  semiTransparentRed: "#FF000080"
  semiTransparentBlack: "#00000066"
  almostOpaque: "#1DA1F2EE"
  fullyTransparent: "#FFFFFF00"
  fullyOpaque: "#6366F1FF"

rgb:
  description: rgb() functional notation
  red: "rgb(255, 0, 0)"
  green: "rgb(0, 255, 0)"
  blue: "rgb(0, 0, 255)"
  white: "rgb(255, 255, 255)"
  black: "rgb(0, 0, 0)"
  coral: "rgb(255, 127, 80)"
  steelBlue: "rgb(70, 130, 180)"
  goldenrod: "rgb(218, 165, 32)"
  mediumOrchid: "rgb(186, 85, 211)"
  darkSlateGray: "rgb(47, 79, 79)"
  noSpaces: "rgb(255,0,128)"
  percentages: "rgb(100%, 50%, 0%)"

rgba:
  description: rgba() with alpha channel
  semiRed: "rgba(255, 0, 0, 0.5)"
  semiBlue: "rgba(0, 0, 255, 0.3)"
  almostOpaque: "rgba(99, 102, 241, 0.9)"
  nearlyInvisible: "rgba(0, 0, 0, 0.05)"
  fullyOpaque: "rgba(52, 211, 153, 1)"
  fullyTransparent: "rgba(255, 255, 255, 0)"
  overlay: "rgba(15, 23, 42, 0.75)"
  tooltip: "rgba(0, 0, 0, 0.85)"

hsl:
  description: "hsl() — hue, saturation, lightness"
  red: "hsl(0, 100%, 50%)"
  green: "hsl(120, 100%, 50%)"
  blue: "hsl(240, 100%, 50%)"
  yellow: "hsl(60, 100%, 50%)"
  cyan: "hsl(180, 100%, 50%)"
  magenta: "hsl(300, 100%, 50%)"
  white: "hsl(0, 0%, 100%)"
  black: "hsl(0, 0%, 0%)"
  gray: "hsl(0, 0%, 50%)"
  warmOrange: "hsl(30, 90%, 55%)"
  coolTeal: "hsl(175, 60%, 45%)"
  softPurple: "hsl(270, 50%, 65%)"

hsla:
  description: hsla() with alpha
  semiRed: "hsla(0, 100%, 50%, 0.5)"
  semiBlue: "hsla(240, 100%, 50%, 0.4)"
  overlay: "hsla(220, 30%, 10%, 0.7)"
  highlight: "hsla(55, 100%, 60%, 0.6)"
  badge: "hsla(270, 60%, 55%, 0.85)"

hwb:
  description: "hwb() — hue, whiteness, blackness (CSS Color 4)"
  red: "hwb(0 0% 0%)"
  lime: "hwb(120 0% 0%)"
  blue: "hwb(240 0% 0%)"
  pink: "hwb(0 50% 0%)"
  darkGreen: "hwb(120 0% 50%)"
  gray: "hwb(0 50% 50%)"

lab:
  description: "lab() — CIE L*a*b* perceptual color space (CSS Color 4)"
  red: "lab(53.23 80.11 67.22)"
  green: "lab(87.82 -79.29 80.99)"
  blue: "lab(32.3 79.19 -107.86)"
  white: "lab(100 0 0)"
  black: "lab(0 0 0)"
  coral: "lab(62.5 40.1 35.2)"

lch:
  description: "lch() — CIE LCH cylindrical color space (CSS Color 4)"
  red: "lch(53.23 104.55 40.0)"
  blue: "lch(32.3 133.81 306.29)"
  neutral: "lch(60 30 200)"
  vivid: "lch(70 80 120)"

oklch:
  description: "oklch() — Oklab LCH, perceptually uniform (CSS Color 4)"
  red: "oklch(0.628 0.2577 29.23)"
  green: "oklch(0.866 0.2948 142.5)"
  blue: "oklch(0.452 0.3131 264.05)"
  white: "oklch(1 0 0)"
  black: "oklch(0 0 0)"
  brand: "oklch(0.65 0.18 250)"
  accent: "oklch(0.72 0.22 145)"

oklab:
  description: "oklab() — Oklab perceptual color space (CSS Color 4)"
  red: "oklab(0.628 0.2249 0.1257)"
  green: "oklab(0.866 -0.2339 0.1794)"
  blue: "oklab(0.452 -0.0324 -0.3118)"
  neutral: "oklab(0.6 0.02 -0.05)"

