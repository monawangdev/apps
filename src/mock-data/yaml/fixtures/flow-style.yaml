# Flow style examples in YAML
metadata: {name: test-app, version: 1.0.0, author: Jane Doe}

simple_object: {key1: value1, key2: value2, key3: value3}

nested_flow: {outer: {inner: {deep: value}}, list: [1, 2, 3]}

array_of_flows:
  - {name: Alice, age: 30, city: NYC}
  - {name: Bob, age: 25, city: LA}
  - {name: Charlie, age: 35, city: Chicago}

mixed_styles:
  flow_map: {type: map, items: [a, b, c]}
  block_map:
    type: map
    items:
      - a
      - b
      - c

complex_flow: {users: [{id: 1, name: Alice}, {id: 2, name: Bob}], count: 2}

inline_arrays: [red, green, blue, yellow, orange, purple]

nested_arrays: [[1, 2, 3], [4, 5, 6], [7, 8, 9]]

flow_with_nulls: {a: 1, b: null, c: 3, d: ~, e: 5}